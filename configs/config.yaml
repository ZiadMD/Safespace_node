# ─────────────────────────────────────────────────────────────────────────────
# Safespace Node — single configuration file
# All paths are relative to the project root unless stated otherwise.
# Environment overrides: NODE_ID → node.id, SERVER_URL → network.server_url,
#                        LOG_LEVEL → logging.level
# ─────────────────────────────────────────────────────────────────────────────

# ── Node identity ─────────────────────────────────────────────────────────────
node:
  id: "safe-space-node-001"        # Unique identifier sent in every network payload
  description: Safespace Highway Node
  lanes: 4                         # Number of lane widgets shown in the dashboard
  default_speed: 120               # Speed (km/h) displayed on startup / after reset
  location:
    lat: "30.610773967468127"                 # Static GPS fallback when SIM808 has no fix
    long: " 32.28915335581145"

# ── Camera ────────────────────────────────────────────────────────────────────
camera:
  model: "picam"              # Camera mode (see below); default is imx500-raw
  #   "picam"       - Raspberry Pi camera via picamera2 (no on-chip AI)
  #   "imx500"      - IMX500 on-chip NPU inference (disables software AI)
  #   "imx500-raw"  - IMX500 sensor as plain camera; software AI + RTSP streaming
  resolution:
    width: 640
    height: 640
  fps: 30                          # Capture frame rate (camera.fps)
  loop_video: true                 # Loop video file when using --video flag

  imx500:                          # Used by "imx500" and "imx500-raw" modes
    camera_num: 0                  # Picamera2 camera index for IMX500 hardware
    model_path: models/accidents-pro-imx.rpk  # .rpk for "imx500" mode only
    confidence: 0.5                # Minimum confidence for on-chip detections
    iou_threshold: 0.65            # NMS IOU threshold for on-chip output tensors
    max_detections: 10             # Maximum detections per frame from on-chip NPU

# ── Frame buffer ──────────────────────────────────────────────────────────────
buffer:
  max_seconds: 30                  # Ring buffer depth in seconds (frames = max_seconds × fps)

# ── AI models ─────────────────────────────────────────────────────────────────
ai:
  models:
    # Software inference model (used in imx500-raw / picam modes)
    accident_detection:
      type: yolo                   # "yolo" (.pt) or "onnx" (.onnx)
      path: models/Accident_and_fire_detector.pt
      confidence: 0.6
      enabled: true
      target_classes:              # Leave empty to accept all classes
        - bus
        - bus_bus_accident
        - bus_object_accident
        - bus_person_accident
        - bus_truck_accident
        - car
        - car_bus_accident
        - car_car_accident
        - car_motorcycle_accident
        - car_object_accident
        - car_person_accident
        - car_truck_accident
        - motorcycle
        - motorcycle_bus_accident
        - motorcycle_motorcycle_accident
        - motorcycle_object_accident
        - motorcycle_person_accident
        - motorcycle_truck_accident
        - truck
        - truck_object_accident
        - truck_person_accident
        - truck_truck_accident
        - smoke
        - fire

    # Example: ONNX model (uncomment and set enabled: true to activate)
    accident_detection_onnx:
      type: onnx
      path: models/best_MSamir.onnx
      confidence: 0.7
      enabled: false
      target_classes:
        - Moderate
        - Severe

# ── RTSP stream ───────────────────────────────────────────────────────────────
stream:
  enabled: true
  port: 8554                       # MediaMTX RTSP port; Central Unit pulls rtsp://<node-ip>:8554/<path>
  path: live                       # Stream path → rtsp://<node-ip>:8554/live
  fps: 15                          # Push rate to MediaMTX (lower than camera.fps saves CPU)
  width: 640                       # Resolution sent to MediaMTX (resized from capture if different)
  height: 640
  mediamtx_path: /home/safe/MediaMTX/mediamtx   # Full path or binary name if on PATH
  mediamtx_config: /home/safe/MediaMTX/mediamtx.yml  # Path to MediaMTX config file

# ── Network ───────────────────────────────────────────────────────────────────
network:
  # Central Unit base URL — the SINGLE, swappable address for the CU (http:// or https://).
  # Direct Ethernet link default: the CU's static IP 192.168.50.1 (see README "Wired bring-up").
  # Override at runtime with the SERVER_URL env var. No CU IPs are hardcoded anywhere in code.
  server_url: http://192.168.50.1:5000
  ws_path: /ws/nodes                    # Raw WebSocket endpoint (appended to server_url)
  config_ws_path: /ws/nodes/config      # Dedicated WebSocket for CU-driven config updates
  heartbeat_interval: 5                 # Seconds between heartbeat POSTs
  timeout: 10                           # HTTP / Socket.IO request timeout (seconds)
  accident_cooldown: 1                  # Minimum seconds between duplicate accident reports

# ── GPS ───────────────────────────────────────────────────────────────────────
gps:
  enabled: true
  port: "/dev/ttyAMA0"            # SIM808 UART device
  baud_rate: 9600
  poll_interval: 10               # Seconds between NMEA reads
  timeout: 2                      # Serial read timeout (seconds)

# ── Display ───────────────────────────────────────────────────────────────────
display:
  mode: dev                        # "dev" = video feeds + AI overlay + system monitor
                                   # "prod" = lanes + speed + warnings only
  width: 1500
  height: 856
  fullscreen: false
  theme: dark

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: INFO                      # DEBUG | INFO | WARNING | ERROR | CRITICAL
  rotation: 5MB                    # Max log file size before rotation
  backup_count: 5                  # Number of rotated log files to keep
  file_logging: true               # Write logs to logs/safespace.log at project root

# ── Failure management ────────────────────────────────────────────────────────
failures:
  threshold: 5                     # Failures within window_seconds before escalation
  window_seconds: 300
  auto_reset: false
