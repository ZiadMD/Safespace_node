node:
  id: "safe-space-node-001"
  location:
    lat: "30.0444"
    long: "31.2357"
  lanes: 4
  default_speed: 120
  description: Safespace Highway Node

camera:
  resolution:
    width: 640
    height: 640
  fps: 30
  # model: "imx500" # Use "IMX500" when using the raspberry pi camera module
  model: "picam"
  # model: "native" # Use "native" for the default camera or specify a custom model if needed
  loop_video: true # Loop video playback when using video input
  imx500:
    model_path: models/imx500_network_yolov8n_pp.rpk # Path to the compiled .rpk model for on-chip inference
    confidence: 0.55 # Minimum confidence threshold for IMX500 detections
    iou_threshold: 0.65 # IOU threshold for NMS on IMX500 output tensors
    max_detections: 10 # Maximum number of detections per frame

buffer:
  max_seconds: 30 # How many seconds of recent footage the ring buffer keeps
  # Buffer size = max_seconds × camera.fps (e.g. 30s × 30fps = 900 frames)

display:
  mode: dev # "dev" = video feeds + AI feed + FPS + system monitor | "prod" = lanes + speed + warnings only
  width: 1500
  height: 856
  fullscreen: false
  theme: dark

ai:
  models:
    accident_detection:
      type: yolo
      path: models/best_MSamir.pt # Path to the model file. Ensure this path is correct and the model is compatible with your setup.
      confidence: 0.7 
      enabled: true # Set to false to disable this model without removing its configuration
      # target_classes is used to specify which classes the model should focus on. If empty, it will consider all detected classes.
      target_classes:
        - Moderate
        - Severe

network:
  server_url: https://scarabaeoid-scrofulously-rupert.ngrok-free.dev
  ws_path: /ws/nodes                # Raw WebSocket endpoint for commands
  heartbeat_interval: 5             # Seconds between heartbeat POSTs
  timeout: 10                        # HTTP / Socket.IO request timeout
  accident_cooldown: 1              # Seconds between duplicate accident reports

logging:
  level: INFO
  rotation: 5MB
  backup_count: 5
  file_logging: true

failures:
  threshold: 5
  window_seconds: 300
  auto_reset: false
