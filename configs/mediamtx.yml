# MediaMTX configuration for Safespace Node
#
# The node pushes to:   rtsp://localhost:8554/live  (via ffmpeg)
# Central Unit pulls:   rtsp://<node-ip>:8554/live
#
# Download MediaMTX from: https://github.com/bluenviron/mediamtx/releases

logLevel: warn
logDestinations: [stdout]

# RTSP server
rtspAddress: :8554
rtspEncryption: no
rtspServerKey: server.key
rtspServerCert: server.crt

# Disable unused protocols
rtmpAddress: :1935
rtmpEncryption: no
hlsAddress: :8888
webrtcAddress: :8889
srtAddress: :8890

# API (disabled)
api: no

paths:
  live:
    # Accept a publisher (ffmpeg) and serve readers (Central Unit)
    source: publisher
